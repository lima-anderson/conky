conky.config = {
    update_interval = 1,
    double_buffer = true,
    no_buffers = true,

    own_window = true,
    own_window_type = 'desktop',

    own_window_argb_visual = true,
    own_window_transparent = true,
    own_window_argb_value = 0,

    own_window_hints = 'undecorated,sticky,skip_taskbar,skip_pager,below',

    alignment = 'top_right',

    gap_x = 30,
    gap_y = 35,

    minimum_width = 320,
    maximum_width = 520,

    use_xft = true,
    font = 'Ubuntu Mono:size=11',
    default_color = 'white',

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    override_utf8_locale = true,
};

conky.text = [[

${font Ubuntu:style=bold:size=18}${alignc}${time %H:%M}${font}
${alignc}${time %A, %d %B %Y}

${voffset -6}
${hr}

SYSTEM
Host: $nodename
Uptime: $uptime
Kernel: $kernel

${voffset -6}
${hr}

CPU: ${cpu}% ${alignr}${cpubar 6}
${cpugraph 15,260}
CPU Temp: ${hwmon 1 temp 1}°C

${voffset -6}
${hr}

MEMORY
RAM: $mem / $memmax ${alignr}${memperc}%
$membar
SWAP: $swap / $swapmax ${alignr}${swapperc}%
${swapbar}

${voffset -6}
${hr}

DISK
/     ${fs_used /} / ${fs_size /} ${alignr}${fs_used_perc /}%
${fs_bar /}
/home ${fs_used /home} / ${fs_size /home} ${alignr}${fs_used_perc /home}%
${fs_bar /home}

${voffset -6}
${hr}

NETWORK (Wi-Fi wlo1)

Down: ${downspeed wlo1} ${alignr}Up: ${upspeed wlo1}
Total Down: ${totaldown wlo1} ${alignr}Total Up: ${totalup wlo1}
IP: ${addr wlo1}

${downspeedgraph wlo1 15,260}

${voffset -6}
${hr}

TOP PROCESSES
${top name 1} ${alignr}${top cpu 1}%
${top name 2} ${alignr}${top cpu 2}%
${top name 3} ${alignr}${top cpu 3}%
${top name 4} ${alignr}${top cpu 4}%
${top name 5} ${alignr}${top cpu 5}%
${top name 6} ${alignr}${top cpu 6}%
${top name 7} ${alignr}${top cpu 7}%
${top name 8} ${alignr}${top cpu 8}%
${top name 9} ${alignr}${top cpu 9}%
${top name 10} ${alignr}${top cpu 10}%

]];
